name: Docker Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish cc-crew
        run: make docker-publish IMAGE_TAG=${{ steps.tag.outputs.tag }}

      - name: Publish cc-crew-sandbox
        run: make docker-publish-sandbox IMAGE_TAG=${{ steps.tag.outputs.tag }}
